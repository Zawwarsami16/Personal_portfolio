name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  typecheck-lint-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: install
        run: npm ci --legacy-peer-deps

      - name: typecheck
        run: npx tsc --noEmit

      - name: lint
        run: npm run lint

      - name: build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
